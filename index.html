<!DOCTYPE html>
<html>
<head>
<title>BM Stores</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

.product{
border:1px solid #ddd;
padding:20px;
margin:20px;
background:white;
display:inline-block;
}

button{
background:black;
color:white;
padding:10px 20px;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h1>BM Stores</h1>
<p>Welcome to BM Stores</p>

<div class="product">
<h2>Aesthetic Poster</h2>
<p>Price: ₹299</p>
<button id="rzp-button1">Buy Now</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
"key": "YOUR_RAZORPAY_KEY",
"amount": "29900",
"currency": "INR",
"name": "BM Stores",
"description": "Poster Purchase",
"handler": function (response){
alert("Payment Successful!");
}
};

var rzp1 = new Razorpay(options);

document.getElementById('rzp-button1').onclick = function(e){
rzp1.open();
e.preventDefault();
}
</script>

</body>
</html>
