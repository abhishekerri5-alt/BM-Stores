<!DOCTYPE html>
<html>
<head>
<title>BM Stores</title>
<link rel="stylesheet" href="style.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>emailjs.init("YOUR_EMAILJS_USER_ID");</script>
</head>
<body>

<h1>BM Stores</h1>
<p>Welcome to BM Stores! Shop the latest products.</p>

<div class="product" id="product1">
<img src="images/poster1.jpg" width="200">
<h2>Aesthetic Poster</h2>
<p>Price: ₹299</p>
<button onclick="buyProduct(1)">Buy Now</button>
</div>

<div class="product" id="product2">
<img src="images/kurta.jpg" width="200">
<h2>Women Printed Kurta</h2>
<p>Price: ₹799</p>
<button onclick="buyProduct(2)">Buy Now</button>
</div>

<!-- Delivery / Shipping Form -->
<div id="shippingForm" style="display:none;">
<h2>Delivery Address</h2>
<input type="text" id="name" placeholder="Full Name" required>
<input type="tel" id="phone" placeholder="Phone Number" required>
<input type="text" id="address" placeholder="Address" required>
<input type="text" id="city" placeholder="City" required>
<input type="text" id="pincode" placeholder="Pincode" required>
<button onclick="proceedPayment()">Proceed to Payment</button>
</div>

<script src="script.js"></script>
</body>
</html>
